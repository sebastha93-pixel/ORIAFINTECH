<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Nexo</title>
<style>
  body{margin:0;background:#070B14;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;}
  .box{text-align:center;color:#F8FAFC;}
  .icon{font-size:48px;margin-bottom:16px;}
  .msg{font-size:15px;color:#94A3B8;}
</style>
</head>
<body>
<div class="box">
  <div class="icon">🔗</div>
  <div class="msg" id="msg">Conectando con Google...</div>
</div>
<script>
  var hash   = window.location.hash.substring(1);
  var search = window.location.search.substring(1);
  var params = new URLSearchParams(hash || search);
  var token  = params.get('access_token');
  var error  = params.get('error');

  if (token) {
    // Always store the token — works for both popup and full-redirect
    localStorage.setItem('nexo_gmail_token', token);
    sessionStorage.setItem('nexo_just_connected', '1');

    if (window.opener && !window.opener.closed) {
      // Popup mode: notify parent and close
      window.opener.postMessage({ type: 'nexo_gmail_token', token: token }, window.location.origin);
      window.close();
    } else {
      // Full-redirect mode (Safari / popup blocked): go back to app
      document.getElementById('msg').textContent = 'Conectado. Volviendo a Nexo...';
      setTimeout(function(){ window.location.replace('/'); }, 500);
    }
  } else if (error) {
    localStorage.setItem('nexo_gmail_error', error);
    sessionStorage.setItem('nexo_just_connected', '1');
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({ type: 'nexo_gmail_error', error: error }, window.location.origin);
      window.close();
    } else {
      document.getElementById('msg').textContent = 'Error: ' + error + '. Volviendo...';
      setTimeout(function(){ window.location.replace('/'); }, 1500);
    }
  } else {
    document.getElementById('msg').textContent = 'Sin respuesta de Google. Cierra esta ventana.';
  }
</script>
</body>
</html>
