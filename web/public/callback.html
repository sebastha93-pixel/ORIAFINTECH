<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Nexo – conectando...</title></head>
<body style="background:#070B14;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:sans-serif;">
  <div style="color:#F8FAFC;text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;">🔗</div>
    <div style="font-size:16px;">Conectando con Google...</div>
  </div>
  <script>
    var hash   = window.location.hash.substring(1);
    var params = new URLSearchParams(hash);
    var token  = params.get('access_token');
    var error  = params.get('error');
    if (token) {
      if (window.opener) {
        window.opener.postMessage({ type: 'nexo_gmail_token', token: token }, window.location.origin);
        window.close();
      }
    } else if (error) {
      if (window.opener) {
        window.opener.postMessage({ type: 'nexo_gmail_error', error: error }, window.location.origin);
        window.close();
      }
    } else {
      document.querySelector('div div:last-child').textContent = 'Error: no se recibió token. Cierra esta ventana.';
    }
  </script>
</body>
</html>
